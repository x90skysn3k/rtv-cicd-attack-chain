<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://x90sky.sh/rtv">
  <link rel="canonical" href="https://x90sky.sh/rtv">
  <title>Redirecting to RTV CI/CD Lab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #02040a;
      --ink: #e8fff0;
      --cyan: #23f7c1;
      --green: #52ff7a;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    main {
      max-width: 42rem;
      padding: 2rem;
      border: 1px solid rgba(82, 255, 122, 0.35);
      background: rgba(6, 18, 31, 0.82);
      box-shadow: 0 0 40px rgba(82, 255, 122, 0.10);
    }
    a {
      color: var(--cyan);
    }
    .prompt {
      color: var(--green);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
  <script>
    window.location.replace("https://x90sky.sh/rtv");
  </script>
</head>
<body>
  <main>
    <p class="prompt">RTV source of truth moved</p>
    <h1>Redirecting to https://x90sky.sh/rtv</h1>
    <p>The canonical landing page has the attendee runbook, public bundle, live demo repo, trophy wall, handouts, and detection links.</p>
    <p><a href="https://x90sky.sh/rtv">Continue to the RTV CI/CD lab page</a></p>
  </main>
</body>
</html>
