name: Trophy Wall

on:
  pull_request_target:
    branches: [main]
    paths:
      - submissions/**
      - scripts/**
      - .github/workflows/**
  push:
    branches: [main]
    paths:
      - submissions/**
  workflow_dispatch:

concurrency:
  group: trophy-wall
  cancel-in-progress: true

jobs:
  validate:
    name: Validate submissions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Enforce submission-only changes
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });
            const allowed = /^submissions\/[A-Za-z0-9_-]{1,30}\.json$/;
            const blocked = files.map((file) => file.filename).filter((name) => !allowed.test(name));
            if (blocked.length) {
              core.setFailed(`Only one submissions/handle-name.json file may change. Blocked: ${blocked.join(", ")}`);
            }
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Validate submissions
        run: python3 scripts/validate_submissions.py
      - name: Test validator
        run: python3 -m unittest discover -s tests -t .

  deploy:
    if: github.event_name != 'pull_request_target'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Render wall
        run: python3 scripts/render_wall.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
